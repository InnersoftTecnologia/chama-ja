# /etc/nginx/sites-available/chama-ja
#
# Estrutura multi-tenant SaaS — Chama Já
# Cada cliente fica em /chama-ja/<slug>/
# Para adicionar um cliente: criar deploy/nginx/clients/<slug>.conf e reiniciar nginx.

server {
    listen 80;
    server_name innersoft.com.br www.innersoft.com.br;
    return 301 https://innersoft.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name innersoft.com.br www.innersoft.com.br;

    ssl_certificate /etc/letsencrypt/live/innersoft.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/innersoft.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # sub_filter padrão para as rotas legadas (/, /tv/, /op/, /admin/, /totem/)
    # Injeta apenas EDGE_BASE — NAV_BASE fica undefined e o JS usa "" como fallback.
    sub_filter '<head>' '<head><script>window.EDGE_BASE="https://innersoft.com.br/api";</script>';
    sub_filter_once on;

    # ── Site principal (seu site, independente do Chama Já) ─────────────────
    # Descomente e ajuste quando o site estiver pronto.
    # location / {
    #     root /home/bruno/site;
    #     index index.html;
    #     try_files $uri $uri/ =404;
    # }

    # ── Rotas legadas do Chama Já (mantidas por compatibilidade) ────────────

    location / {
        root /home/bruno/chama-ja/frontend/dashboard;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /tv/ {
        alias /home/bruno/chama-ja/frontend/tv/;
        index index.html;
        try_files $uri $uri/ /tv/index.html;
    }

    location /op/ {
        alias /home/bruno/chama-ja/frontend/operator/;
        index index.html;
        try_files $uri $uri/ /op/index.html;
    }

    location /admin/ {
        alias /home/bruno/chama-ja/frontend/admin-tenant/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location /totem/ {
        alias /home/bruno/chama-ja/frontend/totem/;
        index index.html;
        try_files $uri $uri/ /totem/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:7071/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ── Clientes SaaS ────────────────────────────────────────────────────────
    include /home/bruno/chama-ja/deploy/nginx/clients/*.conf;
}
