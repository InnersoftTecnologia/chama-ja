# ── Ferreira Costa ───────────────────────────────────────────────────────────
# Slug: fcosta-gus
# API porta: 7071 (instância compartilhada — único tenant por enquanto)
#
# Injeção via sub_filter por location block — substitui o sub_filter global
# do server block para estas rotas, injetando EDGE_BASE e NAV_BASE corretos.

location /chama-ja/fcosta-gus/ {
    alias /home/bruno/chama-ja/frontend/dashboard/;
    index index.html;
    try_files $uri $uri/ /chama-ja/fcosta-gus/index.html;
    sub_filter '<head>' '<head><script>window.EDGE_BASE="https://innersoft.com.br/chama-ja/fcosta-gus/api";window.NAV_BASE="/chama-ja/fcosta-gus";</script>';
    sub_filter_once on;
}

location /chama-ja/fcosta-gus/tv/ {
    alias /home/bruno/chama-ja/frontend/tv/;
    index index.html;
    try_files $uri $uri/ /chama-ja/fcosta-gus/tv/index.html;
    sub_filter '<head>' '<head><script>window.EDGE_BASE="https://innersoft.com.br/chama-ja/fcosta-gus/api";window.NAV_BASE="/chama-ja/fcosta-gus";</script>';
    sub_filter_once on;
}

location /chama-ja/fcosta-gus/op/ {
    alias /home/bruno/chama-ja/frontend/operator/;
    index index.html;
    try_files $uri $uri/ /chama-ja/fcosta-gus/op/index.html;
    sub_filter '<head>' '<head><script>window.EDGE_BASE="https://innersoft.com.br/chama-ja/fcosta-gus/api";window.NAV_BASE="/chama-ja/fcosta-gus";</script>';
    sub_filter_once on;
}

location /chama-ja/fcosta-gus/admin/ {
    alias /home/bruno/chama-ja/frontend/admin-tenant/;
    index index.html;
    try_files $uri $uri/ /chama-ja/fcosta-gus/admin/index.html;
    sub_filter '<head>' '<head><script>window.EDGE_BASE="https://innersoft.com.br/chama-ja/fcosta-gus/api";window.NAV_BASE="/chama-ja/fcosta-gus";</script>';
    sub_filter_once on;
}

location /chama-ja/fcosta-gus/totem/ {
    alias /home/bruno/chama-ja/frontend/totem/;
    index index.html;
    try_files $uri $uri/ /chama-ja/fcosta-gus/totem/index.html;
    sub_filter '<head>' '<head><script>window.EDGE_BASE="https://innersoft.com.br/chama-ja/fcosta-gus/api";window.NAV_BASE="/chama-ja/fcosta-gus";</script>';
    sub_filter_once on;
}

location /chama-ja/fcosta-gus/api/ {
    proxy_pass http://127.0.0.1:7071/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
}
